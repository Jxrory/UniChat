{% if conversations %}
    {% for conv in conversations %}
    <div class="conv-row"
         data-testid="conv-row"
         data-conv-id="{{ conv.id }}"
         hx-get="/admin/conversations/{{ conv.id }}/messages"
         hx-target="#message-panel"
         hx-trigger="click"
         hx-swap="innerHTML">
        <div class="conv-row-info">
            <div class="conv-row-name">{{ conv.contact_name or conv.contact_source_id }}</div>
            <div class="conv-row-meta">
                <span class="badge badge-{{ conv.status }}">{{ conv.status }}</span>
                <span class="conv-row-time">{{ conv.inbox_id }}</span>
            </div>
            {% if conv.last_preview %}
            <div class="conv-row-preview">{{ conv.last_preview }}</div>
            {% endif %}
        </div>
    </div>
    {% endfor %}
{% else %}
<div class="empty-state">暂无对话</div>
{% endif %}
