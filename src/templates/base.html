<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UniChat Admin{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400&display=swap">
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown-light.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --color-primary: #6366F1;
            --color-primary-hover: #4F46E5;
            --color-bg: #FAFAFA;
            --color-surface: #FFFFFF;
            --color-text: #0A0A0A;
            --color-text-secondary: #6B6B6B;
            --color-text-muted: #9C9C9C;
            --color-border: #E8E8EC;
            --color-success: #10B981;
            --color-warning: #F59E0B;
            --color-error: #EF4444;
            --font-display: 'General Sans', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --space: 4px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.5;
        }
        a { color: var(--color-primary); text-decoration: none; }
        a:hover { color: var(--color-primary-hover); }
        button, input, select, textarea { font-family: inherit; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: var(--radius-sm); border: 1px solid transparent;
            cursor: pointer; font-weight: 500; font-size: 14px;
            padding: 10px 16px; transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-primary {
            background: var(--color-primary); color: white; border-color: var(--color-primary);
        }
        .btn-primary:hover { background: var(--color-primary-hover); box-shadow: 0 4px 12px rgba(99,102,241,0.35); }
        .btn-secondary {
            background: transparent; border-color: var(--color-border); color: var(--color-text);
        }
        .btn-secondary:hover { border-color: var(--color-text-secondary); }
        .btn-danger {
            color: var(--color-error); border-color: var(--color-error); background: transparent;
        }
        .btn-danger:hover { background: #FEF2F2; border-color: var(--color-error); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        .input {
            border: 1px solid var(--color-border); background: var(--color-surface);
            border-radius: var(--radius-sm); padding: 10px 14px; font-size: 14px;
            outline: none; transition: border-color 0.2s; width: 100%;
        }
        .input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
        .input::placeholder { color: var(--color-text-muted); }

        .nav {
            height: 56px; display: flex; align-items: center; padding: 0 24px;
            border-bottom: 1px solid var(--color-border); background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 100;
        }
        .nav-brand { font-family: var(--font-display); font-weight: 600; font-size: 18px; letter-spacing: -0.03em; }
        .nav-links { margin-left: auto; display: flex; gap: 16px; align-items: center; }
        .nav-links a { font-size: 14px; color: var(--color-text-secondary); }
        .nav-links a:hover { color: var(--color-primary); }

        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 9999px;
            font-size: 11px; font-weight: 500; letter-spacing: 0.02em;
        }
        .badge-active { background: #D1FAE5; color: #065F46; }
        .badge-pending_human { background: #FEF3C7; color: #92400E; }
        .badge-resolved { background: #F3F4F6; color: #6B7280; }

        .admin-layout { display: flex; height: calc(100vh - 56px); }
        .conv-list { width: 320px; min-width: 320px; border-right: 1px solid var(--color-border); overflow-y: auto; background: var(--color-surface); }
        .msg-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .empty-state {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: var(--color-text-muted); font-size: 14px; padding: 24px; text-align: center;
        }

        .conv-row {
            display: flex; align-items: center; padding: 12px 16px; cursor: pointer;
            border-bottom: 1px solid var(--color-border); transition: background 0.15s;
        }
        .conv-row:hover { background: #F9FAFB; }
        .conv-row.selected { background: #EEF2FF; }
        .conv-row-info { flex: 1; min-width: 0; }
        .conv-row-name { font-weight: 500; font-size: 14px; }
        .conv-row-preview { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .conv-row-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .conv-row-time { font-size: 11px; color: var(--color-text-muted); font-family: var(--font-code); }

        .msg-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: var(--radius-md); font-size: 14px; line-height: 1.5; position: relative; word-wrap: break-word; }
        .msg-bubble-contact { align-self: flex-start; background: #F3F4F6; color: var(--color-text); }
        .msg-bubble-agentbot { align-self: flex-end; background: #EEF2FF; color: var(--color-text); }
        .msg-bubble-agentbot .msg-bubble-label { font-size: 11px; font-weight: 600; color: var(--color-primary); display: block; margin-bottom: 2px; }
        .msg-bubble-user { align-self: flex-end; background: var(--color-primary); color: white; }
        .msg-bubble-activity { align-self: center; font-size: 12px; color: var(--color-text-muted); text-align: center; max-width: 85%; }
        .msg-bubble-time { font-size: 10px; color: inherit; opacity: 0.6; margin-top: 4px; font-family: var(--font-code); }
        .msg-bubble-user .msg-bubble-time { text-align: right; }

        .reply-area { border-top: 1px solid var(--color-border); padding: 16px 24px; background: var(--color-surface); }
        .reply-form { display: flex; gap: 12px; }
        .reply-form .input { flex: 1; }
        .reply-error { color: var(--color-error); font-size: 13px; margin-bottom: 8px; display: none; }
        .reply-error.show { display: block; }

        /* github-markdown-css overrides for ~360px admin bubbles */
        .msg-container .markdown-body {
            font-size: 14px; line-height: 1.5; color: inherit;
            background: transparent; font-family: inherit;
        }
        .msg-container .markdown-body p { margin: 0 0 6px; }
        .msg-container .markdown-body p:last-child { margin-bottom: 0; }
        .msg-container .markdown-body h1,
        .msg-container .markdown-body h2,
        .msg-container .markdown-body h3,
        .msg-container .markdown-body h4,
        .msg-container .markdown-body h5,
        .msg-container .markdown-body h6 {
            margin: 10px 0 4px; font-weight: 600; line-height: 1.3;
        }
        .msg-container .markdown-body h1 { font-size: 18px; }
        .msg-container .markdown-body h2 { font-size: 16px; }
        .msg-container .markdown-body h3 { font-size: 15px; }
        .msg-container .markdown-body h4,
        .msg-container .markdown-body h5,
        .msg-container .markdown-body h6 { font-size: 14px; }
        .msg-container .markdown-body h1:first-child,
        .msg-container .markdown-body h2:first-child,
        .msg-container .markdown-body h3:first-child,
        .msg-container .markdown-body h4:first-child,
        .msg-container .markdown-body h5:first-child,
        .msg-container .markdown-body h6:first-child { margin-top: 0; }
        .msg-container .markdown-body ul,
        .msg-container .markdown-body ol { margin: 4px 0 6px; padding-left: 22px; }
        .msg-container .markdown-body li { margin: 2px 0; }
        .msg-container .markdown-body code {
            font-size: 12.5px; padding: 0.2em 0.4em; word-break: break-all;
            background: rgba(0,0,0,0.07); border-radius: 5px;
        }
        .msg-container .markdown-body pre { margin: 6px 0; padding: 10px 12px; border-radius: 8px; }
        .msg-container .markdown-body pre code { font-size: 12px; background: none; }
        .msg-container .markdown-body table {
            display: table; width: 100%; font-size: 13px; margin: 6px 0;
            border-collapse: separate; border-spacing: 0;
            border-radius: 8px; overflow: hidden;
        }
        .msg-container .markdown-body th,
        .msg-container .markdown-body td {
            padding: 6px 10px; border: none;
            border-top: 1px solid rgba(127,127,127,0.2);
            word-break: break-word;
        }
        .msg-container .markdown-body th {
            border-top: none;
            border-bottom: 2px solid rgba(127,127,127,0.28);
            font-weight: 600;
        }
        .msg-container .markdown-body tbody tr:last-child td { border-bottom: none; }
        .msg-container .markdown-body blockquote { margin: 4px 0; padding: 2px 12px; }
        .msg-container .markdown-body hr { margin: 10px 0; }
        .msg-container .markdown-body img { border-radius: 8px; margin: 4px 0; max-width: 100%; }
        .msg-container .markdown-body a { word-break: break-all; }
        /* user bubble (agent reply): white text on primary */
        .msg-bubble-user .markdown-body code { background: rgba(255,255,255,0.2); }
        .msg-bubble-user .markdown-body pre { background: rgba(255,255,255,0.15); }
        .msg-bubble-user .markdown-body pre code { background: none; }
        .msg-bubble-user .markdown-body blockquote { border-left-color: rgba(255,255,255,0.5); }
        .msg-bubble-user .markdown-body table th,
        .msg-bubble-user .markdown-body table td { border-color: rgba(255,255,255,0.25); }
        .msg-bubble-user .markdown-body th { border-bottom-color: rgba(255,255,255,0.35); }

        .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 40px; width: 360px; }
        .login-card h1 { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 24px; }
        .login-card .input { margin-bottom: 16px; }
        .login-card .error { color: var(--color-error); font-size: 13px; margin-bottom: 12px; }
        .login-card .btn { width: 100%; }
    </style>
</head>
<body>
    {% block nav %}
    <nav class="nav">
        <div class="nav-brand">UniChat</div>
        <div class="nav-links">
            {% if authenticated %}
            <a href="/admin/logout">退出</a>
            {% endif %}
        </div>
    </nav>
    {% endblock %}
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
