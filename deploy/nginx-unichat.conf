# UniChat nginx 反向代理配置
# 放置到 /etc/nginx/sites-available/unichat 并启用：
#   ln -s /etc/nginx/sites-available/unichat /etc/nginx/sites-enabled/
# 编辑后重载：nginx -t && systemctl reload nginx
#
# 需要先配置 upstream 的 TLS 证书（已有），此配置不做证书管理。

server {
    listen 443 ssl http2;
    server_name unichat.example.com;  # 替换为实际域名

    # 已有证书路径 — 替换为你的证书位置
    ssl_certificate     /etc/ssl/certs/example.com/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/example.com/privkey.pem;

    # 安全标头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Telegram webhook 路径
    location /webhooks/telegram/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 路径
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin UI 路径
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 拒绝其他所有请求
    location / {
        return 404;
    }
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name unichat.example.com;
    return 301 https://$host$request_uri;
}
