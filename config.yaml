inboxes:
  - id: tg
    name: "Telegram 主渠道"
    channel_type: telegram
    config:
      token: "${TELEGRAM_BOT_TOKEN}"
      webhook_secret: "${TELEGRAM_WEBHOOK_SECRET}"
      agentbot_url: "${AGENTBOT_URL}"
      agentbot_token: "${AGENTBOT_TOKEN}"
      allowed_senders:
        - "*"

server:
  host: "0.0.0.0"
  port: 8000
  admin_token: "${ADMIN_TOKEN}"

database:
  url: "sqlite+aiosqlite:///./unichat.db"
